<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="stylesheet" href="css.css">
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class= "zoom" onclick="clearDisplay()">C</button>
        <button class= "zoom"  onclick="deleteLast()">⌫</button>
        <button class= "zoom" onclick="append('/')">÷</button>
        <button class= "zoom" onclick="append('*')">×</button>

        <button class= "zoom" onclick="append('7')">7</button>
        <button class= "zoom" onclick="append('8')">8</button>
        <button class= "zoom"  class= "zoom" onclick="append('9')">9</button>
        <button class= "zoom"  onclick="append('-')">-</button>

        <button class= "zoom"  onclick="append('4')">4</button>
        <button class= "zoom"  onclick="append('5')">5</button>
        <button class= "zoom"  onclick="append('6')">6</button>
        <button class= "zoom"  onclick="append('+')">+</button>

        <button class= "zoom"  onclick="append('1')">1</button>
        <button class= "zoom"  onclick="append('2')">2</button>
        <button class= "zoom" onclick="append('3')">3</button>
        <button class= "zoom" rowspan="2" onclick="calculate()">=</button>

        <button class= "zoom"  onclick="append('0')">0</button>
        <button class= "zoom"  onclick="append('.')">.</button>
    </div>
</div>

<script src="js.js"></script>

</body>
</html>
